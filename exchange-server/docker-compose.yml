services:
  reactor-exchange:
    build:
      context: ..
      dockerfile: exchange-server/Dockerfile.daemon
    container_name: reactor-exchange
    restart: always
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    environment:
      REACTOR_DATA_DIR: /data
      REACTOR_HTTP_PORT: ${PORT:-7070}
      REACTOR_ENV_FILE: /app/exchange-server/.env
    ports:
      - "${PORT:-7070}:${PORT:-7070}"
    volumes:
      - ./.env:/app/exchange-server/.env
      - ./cert:/data/tls
      - reactor-exchange-data:/data
    healthcheck:
      test: ["CMD", "node", "daemonctl.js", "status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  reactor-exchange-data:
    name: reactor-exchange-data
