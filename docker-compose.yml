services:
  reactor-exchange:
    profiles: ["exchange"]
    build:
      context: .
      dockerfile: Dockerfile.daemon
    container_name: reactor-exchange
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REACTOR_DATA_DIR: /data
      REACTOR_HTTP_PORT: ${REACTOR_EXCHANGE_PORT:-7070}
      REACTOR_WORKING_MODE: exchange
      REACTOR_EXCHANGE_TOKEN: ${REACTOR_EXCHANGE_TOKEN:-}
    ports:
      - "${REACTOR_EXCHANGE_PORT:-7070}:${REACTOR_EXCHANGE_PORT:-7070}"
    volumes:
      - reactor-exchange-data:/data
    healthcheck:
      test: ["CMD", "node", "daemonctl.js", "status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  reactor-client:
    profiles: ["client"]
    build:
      context: .
      dockerfile: Dockerfile.daemon
    container_name: reactor-client
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REACTOR_DATA_DIR: /data
      REACTOR_HTTP_PORT: ${REACTOR_CLIENT_PORT:-7071}
      REACTOR_WORKING_MODE: node
      REACTOR_EXCHANGE_HOST: ${REACTOR_EXCHANGE_HOST:-}
      REACTOR_EXCHANGE_PORT: ${REACTOR_EXCHANGE_PORT:-7070}
      REACTOR_EXCHANGE_TLS: ${REACTOR_EXCHANGE_TLS:-false}
      REACTOR_EXCHANGE_TOKEN: ${REACTOR_EXCHANGE_TOKEN:-}
    ports:
      - "${REACTOR_CLIENT_PORT:-7071}:${REACTOR_CLIENT_PORT:-7071}"
    volumes:
      - reactor-client-data:/data
    healthcheck:
      test: ["CMD", "node", "daemonctl.js", "status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  reactor-exchange-data:
    name: reactor-exchange-data
  reactor-client-data:
    name: reactor-client-data
